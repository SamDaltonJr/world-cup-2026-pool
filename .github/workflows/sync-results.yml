name: Sync live results

# Pulls World Cup matches + standings from football-data.org (plus live in-play
# scores from api-football) and writes them into Supabase (the `live` row) so the
# site can show live results and the commissioner can pre-fill scoring.
# See scripts/sync-results.mjs.

on:
  # GitHub's scheduled runs are best-effort and, under load, often fire only
  # ~once an hour rather than every 5 minutes. So rather than trust the cron for
  # cadence, each run self-polls every 5 minutes for ~55 minutes (see the loop
  # below). The schedule just needs to start a run roughly each hour; with the
  # single-flight concurrency below, runs queue back-to-back for continuous
  # coverage during matches.
  schedule:
    - cron: "*/5 * * * *"
  # Lets you run it on demand from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read

# Single-flight: while one ~55-min run is going, a new trigger queues (it does
# not cancel the running one), so consecutive runs chain without gaps.
concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # One past the ~55-min loop, so the job never hard-times-out mid-iteration.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Poll live results every 5 min for ~55 min
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          # Optional: free api-football key for live in-play scores. Without it
          # the sync still runs (final scores + standings), just no live overlay.
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          # Reuses the same Supabase secrets the deploy workflow already uses.
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          deadline=$((SECONDS + 3300)) # ~55 minutes
          while :; do
            node scripts/sync-results.mjs || echo "sync iteration failed (continuing)"
            if [ "$SECONDS" -ge "$deadline" ]; then break; fi
            sleep 300 # 5 minutes
          done
